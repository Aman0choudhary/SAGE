<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2048 1118" role="img" aria-labelledby="title desc">
  <title id="title">SAGE Developer Tool</title>
  <desc id="desc">A dark banner with a neon circuit owl above the text SAGE Developer Tool.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="36%" r="55%">
      <stop offset="0%" stop-color="#172132"/>
      <stop offset="55%" stop-color="#0f151c"/>
      <stop offset="100%" stop-color="#090d12"/>
    </radialGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16e9ff"/>
      <stop offset="45%" stop-color="#2d86ff"/>
      <stop offset="100%" stop-color="#8657ff"/>
    </linearGradient>
    <linearGradient id="neonReverse" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#16e9ff"/>
      <stop offset="50%" stop-color="#2d86ff"/>
      <stop offset="100%" stop-color="#8657ff"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="eyeGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

